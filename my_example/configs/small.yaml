# =============================================================================
# SMALL CONSTELLATION — Highly constrained scheduling benchmark
# =============================================================================
#
# Scenario: Walker 3/3/1 (3 sats, 3 planes, 1 per plane), 100 targets
#
# Design rationale:
#   Storage ceiling  = 3 × (80 / 10) = 24 images
#   Oversubscription = 100 / 24 = 4.17  (hard problem)
#   Expected coverage: 20–30 %
#
# This scenario replicates the classic single/few-satellite EOS benchmarks
# (Bensana 1999, Gabrel 2003) extended to a 3-satellite constellation.
# Both storage AND temporal availability are simultaneously binding,
# which maximally differentiates greedy from optimisation-based methods.
#
# Use this to demonstrate: priority-aware scheduling provides the largest
# relative gain over greedy when resources are extremely scarce.
# =============================================================================

simulation:
  satellites: 3
  targets: 100
  target_mode: random
  duration: 86400
  seed: null
  vizard: false

constellation:
  num_planes: 3         # Walker 3/3/1: 1 sat per plane, evenly spaced RAAN
  altitude_km: 550.0
  inclination_deg: 53.0

satellite_resources:
  # 8 images/sat × 3 sats = 24 total  ←  100 targets: OR = 4.17
  storage_capacity_mbits: 80.0
  image_size_mbits: 10.0
  slew_time_sec: 30.0
  imaging_time_sec: 10.0
  max_roll_angle_deg: 45.0
  sensor_fov_deg: 2.5

algorithms:
  run: both
  greedy:
    enabled: true
  genetic:
    enabled: true
    # sqrt(100) × 10 = 100
    population_size: 100
    num_generations: 200
    mutation_rate: 0.15

output:
  save_plots: true
  plot_format: png
  results_dir: res/runs/small_constellation
